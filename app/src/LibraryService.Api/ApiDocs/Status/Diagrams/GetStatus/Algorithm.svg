<?plantuml 1.2026.2beta3?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="CLASS" height="345px" preserveAspectRatio="none" style="width:791px;height:345px;background:#FFFFFF;" version="1.1" viewBox="0 0 791 345" width="791px" zoomAndPan="magnify"><defs/><g><g class="legend" data-source-line="1"><rect fill="#DDDDDD" height="303.3438" rx="7.5" ry="7.5" style="stroke:#000000;stroke-width:1;" width="759.376" x="12" y="22"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="399.3008" x="17" y="39.9951">The plugin you are using seems to generated a bad URL.</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="295.8867" x="17" y="56.292">This URL does not look like DEFLATE data.</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="367.6641" x="17" y="72.5889">It looks like your plugin is using HUFFMAN encoding.</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="4.4502" x="17" y="88.8857">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="671.7061" x="17" y="105.1826">This means you have now to add an header ~1 to your data. For example, you have to change:</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="576.3584" x="17" y="121.4795">http://www.plantuml.com/plantuml/png/H4sIAAAAAAAEAEWOwQrCMBBE7/mKPb...</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="14.0547" x="17" y="137.7764">to</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="596.9961" x="17" y="154.0732">http://www.plantuml.com/plantuml/png/~1H4sIAAAAAAAEAEWOwQrCMBBE7/mKPb...</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="4.4502" x="17" y="170.3701">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="138.2773" x="17" y="186.667">It will work this way</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="428.1484" x="17" y="202.9639">You may contact the PlantUML team at plantuml@gmail.com</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="749.376" x="17" y="219.2607">But you should also probably contact the plugin authors you are currently using and send them this image</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="4.4502" x="17" y="235.5576">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="232.5449" x="17" y="251.8545">For the record, here is your data:</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="4.4502" x="17" y="268.1514">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="697.1904" x="17" y="284.4482">H4sIAAAAAAAEAEWOwQrCMBBE7/mKPba3InhpEevBg3gQ9AtCnJKlMSmbTcW/NwribZh5sztjVitaHsHk</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="700.7451" x="17" y="300.7451">mSNJyjBfy/Q3yMoO5GGDenIebh4MT9T8krRArHKKNuxbUo9IzQu5Nf0VWiTSpuvocqYn1z7ng1NesVMp</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="504.5059" x="17" y="317.042">GAxCBjUx/eFthU9RIfUcfV5A6CiSpMLxzlPdlRYzVl3nvgHzZEFCuAAAAA==</text></g><?plantuml-src ZLFRSjem47tNL-m7PEmoXAPa9ZCrn5m29jnCXhp9zc8xwE9ACWOUyksLxQQPlhJLWqRQopbdToM6AOg4R3E4WfLfBk0YIw0AeTIvI44ZSWr6WWr3HGqcG26Y2OJhkMFJSbsV896eGKW3JCeZiFo8yEYFvjxMXuGQwf1fwzAjptAe3pwBq59Dmj4ey1Q08fQ9DJYanUT8XMvaPVI4bgMgzT34AX6G8KrGmNkdjZMm3H-Cf08yKrumlFdCjJ5nHaMAzoGp