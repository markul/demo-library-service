<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="white"/>
  <text x="300" y="30" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold">GetClientAddress Algorithm</text>
  <rect x="200" y="80" width="200" height="40" fill="#e0e0e0" stroke="#000" rx="5"/>
  <text x="300" y="105" text-anchor="middle" font-family="Arial" font-size="14">Validate clientId path</text>
  <line x1="300" y1="120" x2="300" y2="140" stroke="#000" stroke-width="2"/>
  <rect x="200" y="140" width="200" height="40" fill="#e0e0e0" stroke="#000" rx="5"/>
  <text x="300" y="165" text-anchor="middle" font-family="Arial" font-size="14">Check if address exists</text>
  <line x1="300" y1="180" x2="200" y2="240" stroke="#000" stroke-width="2"/>
  <line x1="300" y1="180" x2="400" y2="240" stroke="#000" stroke-width="2"/>
  <rect x="100" y="240" width="200" height="40" fill="#d4edda" stroke="#000" rx="5"/>
  <text x="200" y="265" text-anchor="middle" font-family="Arial" font-size="14">Return 200 OK</text>
  <rect x="300" y="240" width="200" height="40" fill="#f8d7da" stroke="#000" rx="5"/>
  <text x="400" y="265" text-anchor="middle" font-family="Arial" font-size="14">Return 404 Not Found</text>
  <text x="300" y="350" text-anchor="middle" font-family="Arial" font-size="12">Database: appdb</text>
</svg>
