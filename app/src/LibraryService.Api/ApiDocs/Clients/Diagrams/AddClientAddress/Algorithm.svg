<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <style>
    .actor { fill: #f0f8ff; stroke: #333; stroke-width: 2; }
    .participant { fill: #ffe4b5; stroke: #333; stroke-width: 2; }
    .database { fill: #e6e6fa; stroke: #333; stroke-width: 2; }
    .text { font-family: Arial, sans-serif; font-size: 12px; }
    .arrow { stroke: #333; stroke-width: 2; fill: #333; }
    .label { font-family: Arial, sans-serif; font-size: 10px; fill: #333; }
  </style>
  
  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" class="text" font-size="16" font-weight="bold">Add Client Address Algorithm</text>
  
  <!-- Actors -->
  <rect x="50" y="60" width="100" height="40" class="actor" rx="5"/>
  <text x="100" y="85" text-anchor="middle" class="text">Client</text>
  
  <rect x="50" y="300" width="100" height="40" class="actor" rx="5"/>
  <text x="100" y="325" text-anchor="middle" class="text">Client</text>
  
  <!-- Controller -->
  <rect x="200" y="60" width="120" height="40" class="participant" rx="5"/>
  <text x="260" y="85" text-anchor="middle" class="text">Controller</text>
  
  <!-- Mediator -->
  <rect x="200" y="130" width="120" height="40" class="participant" rx="5"/>
  <text x="260" y="155" text-anchor="middle" class="text">Mediator</text>
  
  <!-- Handler -->
  <rect x="200" y="200" width="120" height="40" class="participant" rx="5"/>
  <text x="260" y="225" text-anchor="middle" class="text">Handler</text>
  
  <!-- Repository -->
  <rect x="200" y="270" width="120" height="40" class="participant" rx="5"/>
  <text x="260" y="295" text-anchor="middle" class="text">Repository</text>
  
  <!-- Database -->
  <ellipse cx="500" cy="180" rx="60" ry="30" class="database"/>
  <text x="500" y="185" text-anchor="middle" class="text">DB</text>
  
  <!-- Arrows -->
  <!-- Client to Controller -->
  <line x1="150" y1="80" x2="200" y2="80" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="175" y="70" text-anchor="middle" class="label">POST /api/clients/{id}/addresses</text>
  
  <!-- Controller to Mediator -->
  <line x1="320" y1="80" x2="320" y2="130" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="330" y="105" class="label">Send(CreateClientAddressCommand)</text>
  
  <!-- Mediator to Handler -->
  <line x1="320" y1="150" x2="320" y2="200" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="330" y="175" class="label">Handle command</text>
  
  <!-- Handler to Repository -->
  <line x1="320" y1="220" x2="320" y2="270" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="330" y="245" class="label">AddAsync(entity)</text>
  
  <!-- Repository to Database -->
  <line x1="320" y1="180" x2="440" y2="180" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="380" y="170" text-anchor="middle" class="label">INSERT client_address</text>
  
  <!-- Database to Repository -->
  <line x1="440" y1="190" x2="320" y2="190" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="380" y="200" text-anchor="middle" class="label">Returns created entity</text>
  
  <!-- Repository to Handler -->
  <line x1="320" y1="290" x2="320" y2="240" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="310" y="265" text-anchor="end" class="label">ClientAddress</text>
  
  <!-- Handler to Mediator -->
  <line x1="320" y1="220" x2="320" y2="170" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="310" y="195" text-anchor="end" class="label">ClientAddressDto</text>
  
  <!-- Mediator to Controller -->
  <line x1="320" y1="150" x2="320" y2="100" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="310" y="125" text-anchor="end" class="label">ClientAddressDto</text>
  
  <!-- Controller to Client -->
  <line x1="260" y1="100" x2="150" y2="300" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="205" y="200" text-anchor="middle" class="label">201 Created</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>
</svg>
